name: Auto-marketing on publish

# Triggers when content-generator bot pushes new articles
# 1. Pings IndexNow â†’ instant Bing + Yandex indexing
# 2. Posts to Telegram channel
# 3. Optional Google sitemap ping

on:
  push:
    paths:
      - 'src/content/blog/**/*.md'
  workflow_dispatch:

jobs:
  marketing:
    runs-on: ubuntu-latest

    env:
      SITE_URL: ${{ secrets.SITE_URL }}
      INDEXNOW_KEY: ${{ secrets.INDEXNOW_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Detect newly added/changed markdown blog posts
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Detect new articles
        id: detect
        run: |
          NEW=$(git diff --name-only ${{ github.event.before }} ${{ github.sha }} -- 'src/content/blog' | grep '\.md$' | head -10 || true)

          COUNT=$(echo "$NEW" | grep -c '\.md' || echo "0")

          URLS=""
          for f in $NEW; do
            [ -z "$f" ] && continue
            SLUG=$(basename "$f" .md)
            URLS="$URLS ${SITE_URL}/blog/${SLUG}/"
          done

          {
            echo "files<<EOF"
            echo "$NEW"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          {
            echo "urls<<EOF"
            echo "$URLS"
            echo "EOF"
          } >> $GITHUB_OUTPUT

          echo "count=$COUNT" >> $GITHUB_OUTPUT

          echo "Detected $COUNT article(s)"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # IndexNow submission
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Ping IndexNow
        if: steps.detect.outputs.count > 0
        run: |
          if [ -z "$INDEXNOW_KEY" ] || [ -z "$SITE_URL" ]; then
            echo "INDEXNOW_KEY or SITE_URL missing â€” skipping"
            exit 0
          fi

          for URL in ${{ steps.detect.outputs.urls }}; do
            [ -z "$URL" ] && continue

            STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
              "https://api.indexnow.org/indexnow?url=${URL}&key=${INDEXNOW_KEY}&keyLocation=${SITE_URL}/${INDEXNOW_KEY}.txt")

            echo "IndexNow: $STATUS â†’ $URL"
          done

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Optional Google sitemap ping
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Ping Google sitemap
        if: steps.detect.outputs.count > 0
        run: |
          if [ -z "$SITE_URL" ]; then
            echo "SITE_URL missing â€” skipping"
            exit 0
          fi

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://www.google.com/ping?sitemap=${SITE_URL}/sitemap-index.xml")

          echo "Google sitemap ping: $STATUS"

      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      # Telegram auto-post
      # â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
      - name: Post to Telegram channel
        if: steps.detect.outputs.count > 0
        run: |
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "Telegram not configured â€” skipping"
            exit 0
          fi

          FIRST_FILE=$(echo "${{ steps.detect.outputs.files }}" | head -1)

          if [ -z "$FIRST_FILE" ]; then
            echo "No file detected"
            exit 0
          fi

          SLUG=$(basename "$FIRST_FILE" .md)

          TITLE=$(grep '^title:' "$FIRST_FILE" 2>/dev/null | head -1 | sed 's/title: "//;s/"//' | sed "s/title: '//;s/'//")

          DESC=$(grep '^description:' "$FIRST_FILE" 2>/dev/null | head -1 | sed 's/description: "//;s/"//' | sed "s/description: '//;s/'//")

          URL="${SITE_URL}/blog/${SLUG}/"

          COUNT=${{ steps.detect.outputs.count }}

          if [ "$COUNT" -gt 1 ]; then
            EXTRA=" (+$((COUNT-1)) more articles published today)"
          else
            EXTRA=""
          fi

          MESSAGE="đź“ť *New article published${EXTRA}*

          *${TITLE}*

          ${DESC}

          đź”— [Read now](${URL})

          #AITools #SmallBusiness #Automation"

          JSON=$(jq -n \
            --arg chat_id "$TELEGRAM_CHAT_ID" \
            --arg text "$MESSAGE" \
            '{
              chat_id: $chat_id,
              text: $text,
              parse_mode: "Markdown",
              disable_web_page_preview: false
            }')

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON")

          echo "Telegram post: $STATUS"